<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin - Original Coffee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#eef2f6;
}

/* HEADER */

.header{
    height:70px;
    background:#0d8ed7;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.header h2{
    font-size:24px;
}

.header a{
    color:white;
    text-decoration:none;
    margin-left:15px;
}

/* LAYOUT */

.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

/* SIDEBAR */

.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #ddd;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:18px;
    cursor:pointer;
    border-bottom:1px solid #eee;
    transition:.3s;
}

.sidebar li:hover{
    background:#f4f8ff;
}

.sidebar li.active{
    background:#e7f3ff;
    color:#0d8ed7;
    font-weight:bold;
}

/* CONTENT */

.content{
    flex:1;
    padding:25px;
}

/* DASHBOARD */

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
    color:#666;
    margin-bottom:10px;
}

.card p{
    font-size:32px;
    color:#0d8ed7;
    font-weight:bold;
}

/* TOOLBAR */

.toolbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.toolbar input{
    width:350px;
    height:42px;
    border:1px solid #ccc;
    border-radius:6px;
    padding:0 12px;
}

.add-btn{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

table th{
    background:#0d8ed7;
    color:white;
}

table th,
table td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

table img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:8px;
}

.edit{
    background:#f39c12;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
}

.delete{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:420px;
    background:white;
    border-radius:10px;
    padding:25px;
}

.modal-content h2{
    margin-bottom:15px;
}

.modal-content input,
.modal-content select{
    width:100%;
    height:42px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:6px;
    padding:0 10px;
}

.save-btn{
    width:100%;
    height:45px;
    border:none;
    background:#0d8ed7;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

@media(max-width:900px){

.cards{
    grid-template-columns:1fr 1fr;
}

.sidebar{
    width:200px;
}

}

</style>
</head>

<body>

<div class="header">

<h2>☕ Original Coffee Admin</h2>

<div>
    <a href="index.html">Trang chủ</a>
    <a href="Order.html">Đơn hàng</a>
</div>

</div>

<div class="container">

<aside class="sidebar">

<ul>

<li class="active" onclick="showAll(this)">
Tất cả sản phẩm
</li>

<li onclick="showDrink(this)">
Quản lý Đồ uống
</li>

<li onclick="showFood(this)">
Quản lý Đồ ăn
</li>

</ul>

</aside>

<main class="content">

<div class="cards">

<div class="card">
<h3>Tổng sản phẩm</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Đồ uống</h3>
<p id="totalDrink">0</p>
</div>

<div class="card">
<h3>Đồ ăn</h3>
<p id="totalFood">0</p>
</div>

<div class="card">
<h3>Đơn hàng</h3>
<p id="totalOrders">0</p>
</div>

</div>

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Tìm sản phẩm..."
onkeyup="searchProduct()">

<button
class="add-btn"
onclick="openAddModal()">
➕ Thêm sản phẩm
</button>

</div>

<table>

<thead>
<tr>
<th>Ảnh</th>
<th>Tên</th>
<th>Giá</th>
<th>Danh mục</th>
<th>Tác vụ</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</main>

</div>

<div class="modal" id="productModal">

<div class="modal-content">

<h2 id="modalTitle">
Thêm sản phẩm
</h2>

<input id="pName" placeholder="Tên sản phẩm">

<input id="pPrice" placeholder="Giá">

<input id="pImage" placeholder="Link ảnh">

<select id="pCategory">
<option>Đồ uống</option>
<option>Đồ ăn</option>
</select>

<button
class="save-btn"
onclick="saveProduct()">
Lưu sản phẩm
</button>

</div>

</div>

<script>

let products=
JSON.parse(localStorage.getItem("products")) ||[

{
name:"Sting",
price:"15000",
category:"Đồ uống",
image:"https://cdnv2.tgdd.vn/bhx-static/bhx/Products/Images/3226/76519/bhx/nuoc-tang-luc-sting-dau-sleek-lon-330ml_202509291421449068.jpg"
},

{
name:"Bò Húc",
price:"20000",
category:"Đồ uống",
image:"https://vietmartjp.com/wp-content/uploads/2021/05/bo-huc-redbull-nuoc-giai-khat-thuc-pham-viet-o-nhat-vietmart.jpg"
},
{
name:"Warrior",
price:"15000",
category:"Đồ uống",
image:"https://cdn.tgdd.vn/Products/Images/3226/209214/bhx/nuoc-tang-luc-warrior-huong-dau-lon-325ml-202306191530349145.jpg"
},

];

let currentProducts=[...products];
let editingIndex=-1;

function render(){

const tbody=document.getElementById("tableBody");

tbody.innerHTML="";

currentProducts.forEach((p,index)=>{

tbody.innerHTML+=`

<tr>

<td>
<img src="${p.image}">
</td>

<td>${p.name}</td>

<td>${Number(p.price).toLocaleString()} đ</td>

<td>${p.category}</td>

<td>

<button
class="edit"
onclick="editProduct(${index})">
Sửa
</button>

<button
class="delete"
onclick="removeProduct(${index})">
Xóa
</button>

</td>

</tr>

`;

});

updateDashboard();

}

function updateDashboard(){

document.getElementById("totalProducts")
.innerText=products.length;

document.getElementById("totalDrink")
.innerText=
products.filter(
p=>p.category==="Đồ uống"
).length;

document.getElementById("totalFood")
.innerText=
products.filter(
p=>p.category==="Đồ ăn"
).length;

document.getElementById("totalOrders")
.innerText=
JSON.parse(
localStorage.getItem("cart")
||"[]"
).length;

}

function setActive(el){

document
.querySelectorAll(".sidebar li")
.forEach(li=>li.classList.remove("active"));

el.classList.add("active");

}

function showAll(el){

setActive(el);

currentProducts=[...products];

render();

}

function showDrink(el){

setActive(el);

currentProducts=
products.filter(
p=>p.category==="Đồ uống"
);

render();

}

function showFood(el){

setActive(el);

currentProducts=
products.filter(
p=>p.category==="Đồ ăn"
);

render();

}

function searchProduct(){

const keyword=
document
.getElementById("search")
.value
.toLowerCase();

currentProducts=
products.filter(
p=>p.name
.toLowerCase()
.includes(keyword)
);

render();

}

function openAddModal(){

editingIndex=-1;

modalTitle.innerText=
"Thêm sản phẩm";

pName.value="";
pPrice.value="";
pImage.value="";

productModal.style.display="flex";

}

function editProduct(index){

editingIndex=index;

const p=currentProducts[index];

pName.value=p.name;
pPrice.value=p.price;
pImage.value=p.image;
pCategory.value=p.category;

modalTitle.innerText=
"Sửa sản phẩm";

productModal.style.display="flex";

}

function saveProduct(){
  

const product={

name:pName.value,
price:pPrice.value,
image:pImage.value,
category:pCategory.value

};

if(editingIndex===-1){

products.push(product);

}else{

const old=
currentProducts[editingIndex];

const realIndex=
products.indexOf(old);

products[realIndex]=product;

}

currentProducts=[...products];
localStorage.setItem(
    "products",
    JSON.stringify(products)
);
render();

productModal.style.display="none";

}

function removeProduct(index){

    if(confirm("Xóa sản phẩm này?")){

        const item = currentProducts[index];

        const realIndex =
        products.indexOf(item);

        products.splice(realIndex,1);

        // cập nhật localStorage
        localStorage.setItem(
            "products",
            JSON.stringify(products)
        );

        currentProducts = [...products];

        render();

    }

}

window.onclick = function(e){

    if(e.target === productModal){

        productModal.style.display = "none";

    }

}

render();

</script>

</body>
</html>
